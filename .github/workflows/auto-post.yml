name: Auto X Posts to Buffer

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Generate posts and send to Buffer
        run: npm start

      - name: Commit updated post history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/post-history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "Update post history"
            git push
          fi
